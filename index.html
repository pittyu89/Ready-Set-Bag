<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ready-Set-Bag! - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Jersey+25&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body class="admin-mode">
  <div class="login-wrapper">

    <!-- LEFT HALF -->
    <div class="left-half">
    <div class="left-panel">
      <h1 class="login-title">Log In</h1>

      <form onsubmit="handleLogin(event)" style="width:100%;display:flex;flex-direction:column;align-items:center;">
        <!-- Username -->
        <div class="input-group">
          <div class="input-icon">
            <img class="user-img" src="images/user.png" alt="Username"/>
          </div>
          <input type="text" id="username" required autocomplete="off">
        </div>

        <!-- Password -->
        <div class="input-group">
          <div class="input-icon">
            <img class="lock-img" src="images/lock.png" alt="Password"/>
          </div>
          <input type="password" id="password" required>
        </div>

        <button type="submit" class="btn-login-index">Log In</button>
      </form>

      <!-- Toggle -->
      <div class="toggle-row">
        <span class="toggle-label">admin</span>
        <label class="toggle-switch">
          <input type="checkbox" id="role-toggle" onchange="switchRole(this)">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
        <span class="toggle-label">teacher</span>
      </div>
    </div>
    </div><!-- end left-half -->

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="panel-icon">
        <!-- Pencil icon (teacher) -->
        <img class="icon-pencil" src="images/pencil.png" alt="Pencil"/>

        <!-- Wrench icon (admin) -->
        <img class="icon-wrench" src="images/wrench.png" alt="Wrench"/>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="login.js"></script>
</body>
</html>
